  <body>
    <div id="root"></div>
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script type="module">
      // Load GPT Engineer tooling only on localhost (dev).
      // In production this script can cause unexpected reload-like behavior on focus/tab switching.
      const isLocalhost =
        location.hostname === 'localhost' ||
        location.hostname === '127.0.0.1' ||
        location.hostname === '[::1]';
      if (isLocalhost) {
        const s = document.createElement('script');
        s.type = 'module';
        s.src = 'https://cdn.gpteng.co/gptengineer.js';
        document.head.appendChild(s);
      }
    </script>
    

    
    <script type="module" src="/src/main.tsx"></script>
    <!-- Suppress PostHog rate limiting warnings -->
    <script>
      const originalError = console.error;
      console.error = function(...args) {
        if (typeof args[0] === 'string' && args[0].includes('[PostHog.js]') && args[0].includes('rate limiting')) {
          return; // Suppress PostHog rate limiting messages
        }
        originalError.apply(console, args);
      };
    </script>
